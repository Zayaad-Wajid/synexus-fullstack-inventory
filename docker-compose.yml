services:
  postgres:
    image: postgres:16
    container_name: synexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synexus_inventory
    ports:
      - "55432:5432"
    volumes:
      - synexus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synexus_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  synexus_postgres_data:
